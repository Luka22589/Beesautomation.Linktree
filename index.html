<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bees Automation</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #09090a;
  font-family: 'DM Serif Display', Georgia, serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 64px 24px 80px;
}

.page {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* ── LOGO ── */
.logo {
  width: 80px;
  height: 80px;
  margin-bottom: 24px;
}

/* ── NAME ── */
.name {
  font-size: 2rem;
  font-weight: 400;
  color: #f0ead6;
  letter-spacing: 0.05em;
  text-align: center;
}
.name em {
  font-style: normal;
  color: #D4AF37;
}

/* ── TAGLINE ── */
.tagline {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: #9e9075;
  text-transform: uppercase;
  text-align: center;
  margin-top: 8px;
}

/* ── RULE ── */
.rule {
  width: 40px;
  height: 1px;
  background: #D4AF37;
  opacity: 0.4;
  margin: 28px 0;
}

/* ── LINKS ── */
.links {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  padding: 15px 20px;
  background: #111110;
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: 3px;
  text-decoration: none;
  color: #f0ead6;
  transition: background 0.2s, border-color 0.2s;
  position: relative;
  overflow: hidden;
}

.btn::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: #D4AF37;
  transform: scaleY(0);
  transform-origin: bottom;
  transition: transform 0.2s;
}

.btn:hover { background: #181714; border-color: rgba(212,175,55,0.5); }
.btn:hover::after { transform: scaleY(1); }

.btn-icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  fill: #D4AF37;
}

.btn-label {
  flex: 1;
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 1rem;
  font-weight: 400;
  color: #f0ead6;
  letter-spacing: 0.02em;
}

.btn-arrow {
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  color: #6b6250;
  transition: transform 0.2s, color 0.2s;
}

.btn:hover .btn-arrow { transform: translateX(4px); color: #D4AF37; }

/* ── FOOTER ── */
.foot {
  margin-top: 48px;
  font-family: 'Space Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.18em;
  color: #3a3628;
  text-transform: uppercase;
  text-align: center;
}

/* ── ANIMATIONS ── */
.page > * {
  opacity: 0;
  transform: translateY(12px);
  animation: up 0.5s ease forwards;
}
.logo    { animation-delay: 0.0s; }
.name    { animation-delay: 0.1s; }
.tagline { animation-delay: 0.15s; }
.rule    { animation-delay: 0.2s; }
.links   { animation-delay: 0.25s; }
.foot    { animation-delay: 0.35s; }

@keyframes ring {
  0%, 100% { transform: scale(0.92); }
  50%       { transform: scale(1.08); }
}
@keyframes up {
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 400px) {
  body { padding: 44px 16px 60px; }
  .name { font-size: 1.7rem; }
}
</style>
</head>
