<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bees Automation</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #D4AF37;
    --gold-dim: #A8892A;
    --gold-glow: rgba(212,175,55,0.12);
    --gold-border: rgba(212,175,55,0.25);
    --bg: #080807;
    --bg-card: #0f0e0c;
    --bg-hover: #161410;
    --text: #f0ead6;
    --text-muted: #8a7f65;
    --text-dim: #4a4535;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  body {
    padding: 60px 20px 80px;
  }

  .container {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Hexagon logo mark */
  .hex-wrap {
    margin-bottom: 28px;
    position: relative;
  }

  .hex-svg {
    width: 88px;
    height: 88px;
    filter: drop-shadow(0 0 18px rgba(212,175,55,0.18));
  }

  /* Animated pulse ring */
  .hex-ring {
    position: absolute;
    inset: -8px;
    animation: pulse-ring 3s ease-in-out infinite;
    opacity: 0;
  }

  @keyframes pulse-ring {
    0%, 100% { opacity: 0; transform: scale(0.95); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  /* Name & tagline */
  .agency-name {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--text);
    text-align: center;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .agency-name span {
    color: var(--gold);
  }

  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    color: var(--text-muted);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 10px;
  }

  /* Divider */
  .divider {
    width: 48px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    margin: 18px 0 32px;
  }

  /* Links */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    padding: 16px 22px;
    background: var(--bg-card);
    border: 1px solid var(--gold-border);
    border-radius: 4px;
    text-decoration: none;
    color: var(--text);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, background 0.25s;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gold);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.2s ease;
  }

  .link-btn:hover {
    background: var(--bg-hover);
    border-color: var(--gold);
  }

  .link-btn:hover::before {
    transform: scaleY(1);
  }

  .link-icon {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .link-icon svg {
    width: 20px;
    height: 20px;
    fill: var(--gold);
  }

  .link-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .link-label {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .link-sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .link-arrow {
    flex-shrink: 0;
    color: var(--gold-dim);
    font-size: 1rem;
    transition: transform 0.2s, color 0.2s;
  }

  .link-btn:hover .link-arrow {
    transform: translateX(4px);
    color: var(--gold);
  }

  /* Honeycomb pattern footer decoration */
  .footer-comb {
    margin-top: 52px;
    opacity: 0.12;
  }

  .footer-note {
    margin-top: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: center;
  }

  /* Fade in animation */
  .container > * {
    animation: fadeUp 0.5s ease both;
  }
  .hex-wrap       { animation-delay: 0.0s; }
  .agency-name    { animation-delay: 0.08s; }
  .tagline        { animation-delay: 0.13s; }
  .divider        { animation-delay: 0.18s; }
  .links          { animation-delay: 0.22s; }
  .footer-comb    { animation-delay: 0.28s; }
  .footer-note    { animation-delay: 0.32s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 400px) {
    .agency-name { font-size: 1.7rem; }
    body { padding: 40px 16px 60px; }
  }
</style>
</head>
